<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AINode — Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/static/img/favicon-48.png">
  <link rel="icon" type="image/png" sizes="128x128" href="/static/img/favicon-128.png">
  <link rel="icon" type="image/png" sizes="256x256" href="/static/img/favicon-256.png">
  <link rel="apple-touch-icon" sizes="256x256" href="/static/img/favicon-256.png">
  <link rel="shortcut icon" href="/static/img/favicon.ico">
</head>
<body>
  <div class="command-center">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="logo">
        <img src="/static/img/logo.png" alt="AINode" class="logo-img">
      </div>
      <nav class="top-nav">
        <button class="nav-pill active" data-view="dashboard">Dashboard</button>
        <button class="nav-pill" data-view="downloads">Downloads</button>
      </nav>
      <div class="top-bar-status">
        <span class="status-dot"></span>
        <span class="node-count" id="top-node-count">1</span>
        <span class="node-label">node online</span>
      </div>
    </header>

    <!-- Left Panel: Chat -->
    <aside class="left-panel" id="chat-panel">
      <button class="btn-nvidia" id="new-chat">+ NEW CHAT</button>
      <input class="search-input" placeholder="Search conversations..." id="chat-search">
      <div class="conversation-list" id="conversation-list">
        <!-- Filled by JS -->
      </div>
    </aside>

    <!-- Center: Topology -->
    <main class="center-stage" id="center-stage">
      <!-- Dashboard view (default) -->
      <div id="view-dashboard" class="view">
        <canvas id="topology-canvas"></canvas>
      </div>
      <!-- Downloads view -->
      <div id="view-downloads" class="view" style="display:none">
        <div class="view-header">
          <h2>Downloads</h2>
          <p>Manage model downloads across the cluster</p>
        </div>
        <div id="downloads-content"></div>
      </div>
      <!-- Models view (accessed from downloads or direct) -->
      <div id="view-models" class="view" style="display:none">
        <div class="view-header">
          <h2>Models</h2>
        </div>
        <div id="models-list"></div>
      </div>
      <!-- Training view -->
      <div id="view-training" class="view" style="display:none">
        <div class="view-header">
          <h2>Training</h2>
        </div>
        <div id="training-content"></div>
      </div>
    </main>

    <!-- Right Panel: Instances + Launch -->
    <aside class="right-panel" id="right-panel">
      <div class="panel-section">
        <h3 class="panel-title"><span class="status-dot online"></span> INSTANCES</h3>
        <div id="instances-list">
          <!-- Filled by JS: running model instance cards -->
        </div>
      </div>
      <div class="panel-section">
        <h3 class="panel-title">&#9671; LAUNCH INSTANCE</h3>
        <div class="launch-form">
          <label class="form-label">Model</label>
          <select id="launch-model" class="form-select">
            <option>— SELECT MODEL —</option>
          </select>
          <label class="form-label">Sharding</label>
          <div class="pill-group" id="sharding-pills">
            <button class="pill active" data-value="pipeline">Pipeline</button>
            <button class="pill" data-value="tensor">Tensor</button>
          </div>
          <label class="form-label">Minimum Nodes</label>
          <div class="node-selector" id="node-selector">
            <button class="node-dot active" data-value="1">1</button>
            <button class="node-dot" data-value="2">2</button>
            <button class="node-dot" data-value="3">3</button>
          </div>
          <button class="btn-nvidia btn-full" id="launch-btn">LAUNCH</button>
        </div>
      </div>
    </aside>

    <!-- Bottom Bar: Chat Input -->
    <footer class="bottom-bar">
      <select id="chat-model" class="model-select">
        <option>Loading models...</option>
      </select>
      <div class="chat-input-wrapper">
        <textarea id="chat-input" class="chat-input" placeholder="Ask anything..." rows="1"></textarea>
        <button id="chat-send" class="btn-send">SEND</button>
      </div>
    </footer>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/static/js/topology.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
